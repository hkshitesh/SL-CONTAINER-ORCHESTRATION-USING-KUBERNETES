apiVersion: apps/v1
kind: Deployment
metadata:
  name: wordpress
  labels:
    app: wordpress

spec:
  replicas: 1
  selector:
    matchLabels:
      app: wordpress

  template:
    metadata:
      labels:
        app: wordpress

    spec:
      containers:
        - name: wordpress
          image: wordpress:latest

          env:
            - name: WORDPRESS_DB_HOST
              value: mysql:3306

            - name: WORDPRESS_DB_USER
              value: root

            - name: WORDPRESS_DB_PASSWORD
              value: simplilearn

            - name: WORDPRESS_DB_NAME
              value: database1

          ports:
            - containerPort: 80
